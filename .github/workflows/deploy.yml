name: Build and deploy server

on:
  pull_request:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: server-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

env:
  AWS_REGION: us-east-1
  PROJECT_ENV: prod

jobs:
  build:
    name: Test and package
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: yarn

      - name: Install dependencies
        run: yarn install --frozen-lockfile --non-interactive

      - name: Test
        run: yarn test

      - name: Package Lambda
        run: |
          yarn bundle:lambda
          node test/lambda-bundle-smoke.js
          cd lambda-package
          zip -qr ../function.zip dist
          cd ..
          package_size=$(stat --format='%s' function.zip)
          if [ "$package_size" -gt 52428800 ]; then
            echo "::error::Lambda package exceeds the 50 MB direct-upload limit"
            exit 1
          fi

      - name: Upload Lambda artifact
        uses: actions/upload-artifact@v4
        with:
          name: server-lambda-${{ github.sha }}
          path: function.zip
          if-no-files-found: error
          retention-days: 5

  deploy:
    name: Deploy production
    if: github.ref == 'refs/heads/main' && github.event_name != 'pull_request'
    needs: build
    runs-on: ubuntu-latest
    timeout-minutes: 10

    permissions:
      contents: read
      id-token: write

    steps:
      - name: Check deployment configuration
        env:
          AWS_DEPLOY_ROLE_ARN: ${{ vars.AWS_DEPLOY_ROLE_ARN }}
        run: |
          if [ -z "$AWS_DEPLOY_ROLE_ARN" ]; then
            echo "::error::Required repository variable AWS_DEPLOY_ROLE_ARN is not configured"
            exit 1
          fi

      - name: Download Lambda artifact
        uses: actions/download-artifact@v5
        with:
          name: server-lambda-${{ github.sha }}

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v6
        with:
          role-to-assume: ${{ vars.AWS_DEPLOY_ROLE_ARN }}
          role-session-name: GitHubActionsServerDeploy
          aws-region: ${{ env.AWS_REGION }}

      - name: Load deployment parameters
        run: |
          lambda_function_name=$(aws ssm get-parameter \
            --name "/${PROJECT_ENV}/server/lambda-function-name" \
            --query 'Parameter.Value' \
            --output text)
          if [ -z "$lambda_function_name" ] || [ "$lambda_function_name" = "None" ]; then
            echo "::error::Lambda function name parameter is empty"
            exit 1
          fi
          echo "LAMBDA_FUNCTION_NAME=$lambda_function_name" >> "$GITHUB_ENV"

      - name: Publish Lambda
        run: aws lambda update-function-code --function-name "${LAMBDA_FUNCTION_NAME}" --zip-file fileb://function.zip

      - name: Wait for Lambda update
        run: aws lambda wait function-updated --function-name "${LAMBDA_FUNCTION_NAME}"

      - name: Verify Lambda update
        run: |
          aws lambda get-function-configuration \
            --function-name "${LAMBDA_FUNCTION_NAME}" \
            --query '{State:State,LastUpdateStatus:LastUpdateStatus,Handler:Handler,Runtime:Runtime}'
