name: Deploy server

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

concurrency:
  group: deploy-server-production
  cancel-in-progress: false

env:
  AWS_REGION: us-east-1
  PROJECT_ENV: prod

jobs:
  deploy:
    name: Build and deploy
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Check deployment configuration
        env:
          AWS_DEPLOY_ROLE_ARN: ${{ vars.AWS_DEPLOY_ROLE_ARN }}
        run: |
          if [ -z "$AWS_DEPLOY_ROLE_ARN" ]; then
            echo "::error::Required repository variable AWS_DEPLOY_ROLE_ARN is not configured"
            exit 1
          fi

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: yarn

      - name: Install dependencies
        run: yarn install --frozen-lockfile --non-interactive

      - name: Test
        run: yarn test

      - name: Package Lambda
        run: |
          test -f dist/lambda.js
          mkdir lambda-package
          cp package.json yarn.lock lambda-package/
          cp -R dist lambda-package/dist
          printf '#!/bin/sh\nexec node dist/index.js\n' > lambda-package/run.sh
          chmod +x lambda-package/run.sh
          yarn install \
            --cwd lambda-package \
            --production=true \
            --frozen-lockfile \
            --ignore-scripts \
            --non-interactive
          cd lambda-package
          zip -qr ../function.zip dist node_modules package.json run.sh yarn.lock
          cd ..
          package_size=$(stat --format='%s' function.zip)
          if [ "$package_size" -gt 52428800 ]; then
            echo "::error::Lambda package exceeds the 50 MB direct-upload limit"
            exit 1
          fi

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v6
        with:
          role-to-assume: ${{ vars.AWS_DEPLOY_ROLE_ARN }}
          role-session-name: GitHubActionsServerDeploy
          aws-region: ${{ env.AWS_REGION }}

      - name: Load deployment parameters
        run: |
          lambda_function_name=$(aws ssm get-parameter \
            --name "/${PROJECT_ENV}/server/lambda-function-name" \
            --query 'Parameter.Value' \
            --output text)
          if [ -z "$lambda_function_name" ] || [ "$lambda_function_name" = "None" ]; then
            echo "::error::Lambda function name parameter is empty"
            exit 1
          fi
          echo "LAMBDA_FUNCTION_NAME=$lambda_function_name" >> "$GITHUB_ENV"

      - name: Publish Lambda
        run: aws lambda update-function-code --function-name "${LAMBDA_FUNCTION_NAME}" --zip-file fileb://function.zip

      - name: Wait for Lambda update
        run: aws lambda wait function-updated --function-name "${LAMBDA_FUNCTION_NAME}"

      - name: Verify Lambda update
        run: |
          aws lambda get-function-configuration \
            --function-name "${LAMBDA_FUNCTION_NAME}" \
            --query '{State:State,LastUpdateStatus:LastUpdateStatus,Handler:Handler,Runtime:Runtime}'
